<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Performance Engine V2</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #09090b;
            --surface-bg: rgba(24, 24, 27, 0.6);
            --surface-border: rgba(255, 255, 255, 0.08);
            --text-primary: #fafafa;
            --text-secondary: #a1a1aa;
            --accent: #8b5cf6;
            --accent-hover: #7c3aed;
            --error: #ef4444;
            --success: #10b981;
            --cyan: #63b3ed;
            --transition: all 0.3s ease;
        }

        * { box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { margin: 0; padding: 2rem; background: var(--bg-dark); color: var(--text-primary); min-height: 100vh; display: flex; flex-direction: column; }

        /* Animated Mesh Background */
        .bg-mesh {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle at 15% 50%, rgba(139, 92, 246, 0.15), transparent 40%),
                        radial-gradient(circle at 85% 30%, rgba(59, 130, 246, 0.15), transparent 40%);
            animation: mesh-shift 20s ease-in-out infinite alternate;
        }
        @keyframes mesh-shift { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(45deg); } }

        .container { flex: 1; max-width: 1500px; width: 100%; margin: 0 auto; display: grid; grid-template-columns: 350px 1fr; gap: 2rem; }

        .panel {
            background: var(--surface-bg); border: 1px solid var(--surface-border);
            border-radius: 16px; padding: 1.5rem; backdrop-filter: blur(20px);
            display: flex; flex-direction: column; overflow: hidden;
        }

        h1 { font-size: 1.5rem; margin: 0 0 1.5rem 0; display: flex; align-items: center; justify-content: space-between; }
        
        .connection-indicator { display: flex; align-items: center; gap: 0.5rem; font-size: 0.8rem; font-weight: 500; color: var(--text-secondary); }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--error); box-shadow: 0 0 10px var(--error); transition: var(--transition); }
        .dot.connected { background: var(--success); box-shadow: 0 0 10px var(--success); }

        .input-group { margin-bottom: 1.25rem; }
        .input-group label { display: block; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem; font-weight: 500; }
        input[type="url"], input[type="text"], input[type="number"], select {
            width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--surface-border);
            color: white; padding: 0.75rem 1rem; border-radius: 8px; font-size: 0.95rem; outline: none; transition: var(--transition);
        }
        input:focus, select:focus { border-color: var(--accent); }

        .checkbox-group { display: flex; flex-direction: column; gap: 0.75rem; background: rgba(0,0,0,0.2); padding: 1rem; border-radius: 8px; border: 1px solid var(--surface-border); margin-bottom: 1.5rem; }
        .checkbox-label { display: flex; align-items: center; gap: 0.75rem; font-size: 0.9rem; cursor: pointer; user-select: none; }
        .checkbox-label input { width: 18px; height: 18px; accent-color: var(--accent); cursor: pointer; }

        .btn {
            width: 100%; padding: 0.8rem; border: none; border-radius: 8px; font-weight: 600; font-size: 1rem;
            cursor: pointer; transition: var(--transition); display: flex; justify-content: center; align-items: center; gap: 0.5rem; margin-bottom: 0.75rem;
        }
        .btn-primary { background: linear-gradient(135deg, var(--accent) 0%, #6366f1 100%); color: white; box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3); }
        .btn-primary:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(139, 92, 246, 0.4); }
        .btn-secondary { background: rgba(255,255,255,0.05); color: var(--text-primary); border: 1px solid var(--surface-border); }
        .btn-secondary:hover:not(:disabled) { background: rgba(255,255,255,0.1); }
        .btn-danger { background: rgba(239, 68, 68, 0.1); color: var(--error); border: 1px solid rgba(239,68,68,0.3); display: none; }
        .btn-danger:hover { background: rgba(239, 68, 68, 0.2); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

        .tabs { display: flex; border-bottom: 1px solid var(--surface-border); margin-bottom: 0; background: rgba(0,0,0,0.2); overflow-x: auto; flex-wrap: nowrap; }
        .tab-btn {
            flex: 1; padding: 1rem 0.75rem; background: transparent; border: none; border-bottom: 2px solid transparent; white-space: nowrap;
            color: var(--text-secondary); font-weight: 500; cursor: pointer; transition: var(--transition); font-size: 0.95rem; min-width: max-content;
        }
        .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); background: rgba(255,255,255,0.02); }
        .tab-btn:hover:not(.active) { color: white; }

        .tab-content { display: none; padding: 1.5rem; flex: 1; overflow-y: auto; background: rgba(0,0,0,0.1); flex-direction: column; }
        .tab-content.active { display: flex; }

        /* Data Displays */
        pre { margin: 0; font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; color: #a5b4fc; white-space: pre-wrap; word-wrap: break-word; }
        .log-line { margin-bottom: 0.5rem; padding-bottom: 0.5rem; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .log-time { color: var(--text-secondary); font-size: 0.75rem; margin-right: 0.75rem; }
        .log-msg { color: var(--success); }
        
        .progress-box { background: #000; border-radius: 8px; width: 100%; margin: 1rem 0; overflow: hidden; display: none; border: 1px solid var(--surface-border); padding: 0.5rem 1rem; flex-direction: column;}
        .progress-bar-container { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 99px; margin-bottom: 0.5rem; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; background: var(--cyan); transition: width 0.3s ease; box-shadow: 0 0 10px var(--cyan); }
        .progress-text { display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--text-secondary); }

        .json-key { color: #818cf8; }
        .json-string { color: #34d399; }
        .json-number { color: #f472b6; }
        .json-boolean { color: #fbbf24; }

        .empty-state { text-align: center; color: var(--text-secondary); margin-top: 3rem; font-size: 1rem; border: 1px dashed var(--surface-border); padding: 3rem; border-radius: 12px; }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        ::-webkit-scrollbar-thumb { background: var(--surface-border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

        #iframe-container { width: 100%; height: 100%; border: none; border-radius: 8px; background: #fff;}
        
        .history-card { background: rgba(255,255,255,0.03); border: 1px solid var(--surface-border); border-radius: 12px; padding: 1rem; margin-bottom: 0.75rem; display: flex; justify-content: space-between; align-items: center; transition: var(--transition); cursor: pointer; }
        .history-card:hover { background: rgba(255,255,255,0.07); transform: scale(1.01); }
        .grade-badge { padding: 4px 10px; border-radius: 6px; font-weight: 800; font-size: 0.8rem; color: white; margin-right: 0.75rem; }
        .grade-A { background: var(--success); } .grade-B { background: #3b82f6; } .grade-C { background: #eab308; } .grade-D { background: #f97316; } .grade-F { background: var(--error); }
    </style>
</head>
<body>
    <div class="bg-mesh"></div>

    <div class="container">
        <!-- Sidebar Controls -->
        <div class="panel" style="overflow-y: auto;">
            <h1>
                Engine Config
                <div class="connection-indicator">
                    <div class="dot" id="conn-dot"></div>
                    <span id="conn-text">Checking...</span>
                </div>
            </h1>

            <div class="input-group">
                <label>Target URL</label>
                <input type="url" id="target-url" placeholder="https://example.com" value="https://nightflix.lat" autocomplete="off">
            </div>

            <div class="input-group">
                <label>Test Type Strategy</label>
                <select id="test-type">
                    <option value="standard">Standard Execution</option>
                    <option value="spike">Spike Test (Stress)</option>
                    <option value="scalability">Scalability Plateau</option>
                </select>
            </div>

            <div class="checkbox-group">
                <label class="checkbox-label"><input type="checkbox" id="include_network" checked> Analyze Network Traffic</label>
                <label class="checkbox-label"><input type="checkbox" id="include_resources" checked> Analyze Resources & Memory</label>
                <label class="checkbox-label"><input type="checkbox" id="include_breakpoint"> Stress & Breakpoint Tuning</label>
                <label class="checkbox-label"><input type="checkbox" id="include_dos"> Emulate High-Concurrency DoS</label>
            </div>

            <div class="progress-box" id="progress-container">
                <div class="progress-bar-container">
                    <div class="progress-fill" id="progress-bar"></div>
                </div>
                <div class="progress-text">
                    <span id="timer-text">00:00 s</span>
                    <span style="opacity:0.6;">(Est: ~45s)</span>
                </div>
            </div>

            <button class="btn btn-primary" id="btn-full" onclick="startExecution(false)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                Run Full Test
            </button>
            <button class="btn btn-secondary" id="btn-base" onclick="startExecution(true)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12h4l2-9 5 18 3-9h6"></path></svg>
                Baseline Only
            </button>
            <button class="btn btn-danger" id="btn-stop" onclick="stopExecution()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect></svg>
                Abort Execution
            </button>

            <div style="margin-top: auto; padding-top: 1.5rem; border-top: 1px solid var(--surface-border); display: flex; gap: 0.5rem; flex-wrap: wrap;">
                <button class="btn btn-secondary" onclick="exportData('json')" style="flex:1; margin: 0; font-size: 0.85rem;" id="btn-exp-json" disabled>Export JSON</button>
                <button class="btn btn-secondary" onclick="exportData('csv')" style="flex:1; margin: 0; font-size: 0.85rem;" id="btn-exp-csv" disabled>Export CSV</button>
            </div>
        </div>

        <!-- Main Output Panel -->
        <div class="panel" style="padding: 0;">
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('log')">Live Log</button>
                <button class="tab-btn" onclick="switchTab('report')" id="tab-btn-report">Final Report (HTML)</button>
                <button class="tab-btn" onclick="switchTab('results')">JSON Metrics</button>
                <button class="tab-btn" onclick="switchTab('breakpoint')">Breakpoint Stats</button>
                <button class="tab-btn" onclick="switchTab('network')">Network Trace</button>
                <button class="tab-btn" onclick="switchTab('history')" onclick="loadHistory()">History</button>
            </div>

            <div id="tab-log" class="tab-content active" style="background:#000;">
                <div id="log-output">
                    <div style="color:var(--text-secondary); font-family:monospace;">[SYSTEM] Dashboard Initialized.</div>
                </div>
            </div>
            
            <div id="tab-report" class="tab-content" style="padding: 0;">
                <iframe id="iframe-container" src="about:blank"></iframe>
                <div id="report-empty" class="empty-state">No report generated yet. Run a test first.</div>
            </div>
            
            <div id="tab-results" class="tab-content"><div id="data-results" class="empty-state">Waiting for execution...</div></div>
            <div id="tab-breakpoint" class="tab-content"><div id="data-breakpoint" class="empty-state">Waiting for execution...</div></div>
            <div id="tab-network" class="tab-content"><div id="data-network" class="empty-state">Waiting for execution...</div></div>
            
            <div id="tab-history" class="tab-content">
                <div id="history-header" style="margin-bottom: 2rem;">
                    <h2>Audit History</h2>
                    <p style="color:var(--text-secondary); font-size:0.9rem;">Archived reports tracked by SQLite</p>
                </div>
                <div id="history-list"></div>
                <div id="history-empty" class="empty-state" style="display:none;">No historical records found.</div>
            </div>
        </div>
    </div>

    <script>
        let pollInterval = null;
        let activeTaskId = null;
        let abortController = null;
        let latestMetricsData = null;
        let lastReportedStage = "";
        
        let timerInterval = null;
        let elapsedSeconds = 0;

        const DOM = {
            dot: document.getElementById('conn-dot'),
            txt: document.getElementById('conn-text'),
            logs: document.getElementById('log-output'),
            progBox: document.getElementById('progress-container'),
            progBar: document.getElementById('progress-bar'),
            timer: document.getElementById('timer-text'),
            btnFull: document.getElementById('btn-full'),
            btnBase: document.getElementById('btn-base'),
            btnStop: document.getElementById('btn-stop'),
            btnJson: document.getElementById('btn-exp-json'),
            btnCsv: document.getElementById('btn-exp-csv'),
            iframe: document.getElementById('iframe-container'),
            reportEmpty: document.getElementById('report-empty')
        };

        // 1. Connection Health & Timer
        async function checkConnection() {
            try {
                const res = await fetch('/health');
                if (res.ok) {
                    DOM.dot.className = 'dot connected';
                    DOM.txt.innerText = 'Online';
                    DOM.txt.style.color = 'var(--success)';
                } else throw new Error();
            } catch (e) {
                DOM.dot.className = 'dot';
                DOM.txt.innerText = 'Offline';
                DOM.txt.style.color = 'var(--error)';
            }
        }
        checkConnection();
        setInterval(checkConnection, 10000);

        function startTimer() {
            elapsedSeconds = 0;
            DOM.timer.innerText = "00:00 s";
            if(timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                elapsedSeconds++;
                const m = String(Math.floor(elapsedSeconds / 60)).padStart(2, '0');
                const s = String(elapsedSeconds % 60).padStart(2, '0');
                DOM.timer.innerText = `${m}:${s} s`;
            }, 1000);
        }

        // 2. Syntax Highlighting & Formatter
        function syntaxHighlight(json) {
            if (typeof json != 'string') json = JSON.stringify(json, undefined, 2);
            json = json.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            return '<pre>' + json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, function (match) {
                let cls = 'json-number';
                if (/^"/.test(match)) {
                    if (/:$/.test(match)) cls = 'json-key';
                    else cls = 'json-string';
                } else if (/true|false/.test(match)) cls = 'json-boolean';
                else if (/null/.test(match)) cls = 'json-boolean';
                return '<span class="' + cls + '">' + match + '</span>';
            }) + '</pre>';
        }
        
        function parseEmptyState(obj, modName) {
            if (!obj || (Array.isArray(obj) && obj.length === 0) || Object.keys(obj).length === 0) {
                return `<div class="empty-state">
                    <h3>No Data Generated</h3>
                    <p>The <b>${modName}</b> tests were not triggered during this execution run. Ensure your configuration flags invoke these modules.</p>
                </div>`;
            }
            return syntaxHighlight(obj);
        }

        function switchTab(id) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            // Allow multiple elements matching the selector if needed, but here we just target current
            if(event && event.currentTarget) event.currentTarget.classList.add('active');
            else document.querySelector(`.tab-btn[onclick="switchTab('${id}')"]`).classList.add('active');
            
            document.getElementById('tab-' + id).classList.add('active');
            
            if(id === 'history') loadHistory();
        }

        function appendLog(msg, isErr=false) {
            const wrapper = document.createElement('div');
            wrapper.className = 'log-line';
            const time = new Date().toLocaleTimeString();
            wrapper.innerHTML = `<span class="log-time">[${time}]</span><span class="log-msg" style="color:${isErr?'var(--error)':'var(--cyan)'}">${msg}</span>`;
            DOM.logs.appendChild(wrapper);
            DOM.logs.parentElement.scrollTop = DOM.logs.parentElement.scrollHeight;
        }

        function setUIState(running) {
            DOM.btnFull.disabled = running;
            DOM.btnBase.disabled = running;
            DOM.btnStop.style.display = running ? 'flex' : 'none';
            DOM.progBox.style.display = running ? 'flex' : 'none';
            if(!running) {
                DOM.progBar.style.width = '0%';
                if(timerInterval) clearInterval(timerInterval);
            }
        }

        // 3. Execution logic
        async function startExecution(isBaselineOnly) {
            const url = document.getElementById('target-url').value;
            if (!url) return alert('Target URL is required');

            const payload = {
                url: url,
                test_type: isBaselineOnly ? 'standard' : document.getElementById('test-type').value,
                dos: isBaselineOnly ? false : document.getElementById('include_dos').checked,
                include_network: isBaselineOnly ? false : document.getElementById('include_network').checked,
                include_resources: isBaselineOnly ? false : document.getElementById('include_resources').checked,
                include_breakpoint: isBaselineOnly ? false : document.getElementById('include_breakpoint').checked
            };

            setUIState(true);
            DOM.logs.innerHTML = '';
            lastReportedStage = "";
            DOM.iframe.style.display = 'none';
            DOM.reportEmpty.style.display = 'block';
            DOM.reportEmpty.innerText = "Analysis running... Report building.";
            
            appendLog(`Initializing test suite for ${url}`);
            
            abortController = new AbortController();
            switchTab('log');
            startTimer();

            try {
                const res = await fetch('/run-perf', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                    signal: abortController.signal
                });
                if (!res.ok) throw new Error("Failed to dispatch execution");
                
                const data = await res.json();
                activeTaskId = data.task_id;
                appendLog(`Task registered. Orchestrator ID: ${activeTaskId}`);
                startPolling();
            } catch (err) {
                if (err.name !== 'AbortError') {
                    appendLog("Error: " + err.message, true);
                    alert("Execution Error: " + err.message);
                }
                setUIState(false);
            }
        }

        function startPolling() {
            if (pollInterval) clearInterval(pollInterval);
            let noDataRepeats = 0;

            pollInterval = setInterval(async () => {
                if (!activeTaskId) return;
                try {
                    const res = await fetch(`/progress/${activeTaskId}`);
                    if (!res.ok) { noDataRepeats++; return; }
                    noDataRepeats = 0;
                    const statusData = await res.json();
                    
                    DOM.progBar.style.width = (statusData.percent || 0) + "%";

                    if (statusData.stage && statusData.stage !== lastReportedStage) {
                        appendLog(statusData.stage, statusData.stage.includes('Error') || statusData.stage.includes('Failed'));
                        lastReportedStage = statusData.stage;
                    }

                    if (statusData.status === 'complete' || statusData.status === 'error') {
                        clearInterval(pollInterval);
                        onExecutionComplete(statusData.status === 'complete', statusData.report_url);
                        if (statusData.status === 'error') {
                            appendLog(`Failed: ${statusData.error}`, true);
                        }
                    }
                } catch (err) {
                    console.error("Polling error", err);
                    noDataRepeats++;
                    if (noDataRepeats > 5) appendLog("Lost connection to task orchestrator.", true);
                }
            }, 1000);
        }

        async function onExecutionComplete(success, reportUrl) {
            setUIState(false);
            if (success) {
                appendLog(`Analysis complete natively in ${elapsedSeconds} seconds.`);
                
                // Embed HTML Report dynamically
                if (reportUrl) {
                    DOM.iframe.src = reportUrl;
                    DOM.iframe.style.display = 'block';
                    DOM.reportEmpty.style.display = 'none';
                    appendLog("Visual HTML Report is now available in the Final Report tab.");
                    switchTab('report');
                }

                // Fetch JSON Metrics for sidebars
                try {
                    const mRes = await fetch('/api/metrics');
                    if (mRes.ok) {
                        latestMetricsData = await mRes.json();
                        hydrateSidebars(latestMetricsData);
                        DOM.btnJson.disabled = false;
                        DOM.btnCsv.disabled = false;
                    }
                } catch(e) { appendLog("Failed pulling /api/metrics: " + e.message, true); }
            }
        }

        function hydrateSidebars(data) {
            const root = data.authenticated || data.anonymous || data;
            
            document.getElementById('data-results').innerHTML = parseEmptyState(root.evaluation || root, "Evaluation Stats");
            
            const netData = root.network_stress || root.all_requests || [];
            document.getElementById('data-network').innerHTML = parseEmptyState(netData, "Network Inspection");
            
            document.getElementById('data-breakpoint').innerHTML = parseEmptyState(root.ramp_results || root.spike_results || [], "Spike/Breakpoint");
        }

        function stopExecution() {
            if (abortController) abortController.abort();
            clearInterval(pollInterval);
            setUIState(false);
            appendLog("Execution forcibly aborted by user action.", true);
        }
        
        // 4. History API
        async function loadHistory() {
            const list = document.getElementById('history-list');
            const emptyEl = document.getElementById('history-empty');
            
            list.innerHTML = '<p style="color:var(--text-secondary); text-align:center;">Syncing with embedded database...</p>';
            
            try {
                const res = await fetch('/api/reports');
                const data = await res.json();
                
                if (!data || data.length === 0) {
                    list.innerHTML = '';
                    emptyEl.style.display = 'block';
                    return;
                }
                
                emptyEl.style.display = 'none';
                list.innerHTML = '';
                
                data.forEach(report => {
                    const dt = new Date(report.timestamp ? report.timestamp.replace(' ', 'T') + 'Z' : report.date); // Standardize timezone
                    const row = document.createElement('div');
                    row.className = 'history-card';
                    
                    // Simple grade coloring map
                    const grClass = report.grade ? `grade-${report.grade}` : 'grade-F';
                    
                    row.innerHTML = `
                        <div style="flex:1;">
                            <div style="display:flex; align-items:center; margin-bottom: 4px;">
                                <span class="grade-badge ${grClass}">${report.grade || '-'}</span>
                                <strong style="font-size:1.05rem;">${(report.name || 'Audit').replace(' Performance Audit', '')}</strong>
                            </div>
                            <div style="font-size:0.8rem; color:var(--text-secondary); display:flex; gap:1rem;">
                                <span>🗓️ ${dt.toLocaleString()}</span>
                                <span>✅ ${report.passed || 0} Passes</span>
                                <span>❌ ${report.failed || 0} Fails</span>
                            </div>
                        </div>
                        <div style="text-align:right;">
                            <div style="font-weight:600; color:var(--text-secondary); font-size:0.9rem;">${report.duration ? parseFloat(report.duration).toFixed(1) : 0}s</div>
                            <button class="btn btn-secondary" style="padding: 4px 12px; margin-top:4px; font-size:0.75rem;" onclick="window.open('${report.url}', '_blank')">View Report ↗</button>
                        </div>
                    `;
                    list.appendChild(row);
                });
            } catch (err) {
                list.innerHTML = `<div class="empty-state" style="color:var(--error)">Error fetching history: ${err.message}</div>`;
            }
        }

        // Exports
        function exportData(type) {
            if (!latestMetricsData) return;
            const root = latestMetricsData.authenticated || latestMetricsData.anonymous || latestMetricsData;
            
            let blob, fname;
            if (type === 'json') {
                blob = new Blob([JSON.stringify(root, null, 2)], { type: 'application/json' });
                fname = `perf_export_${new Date().getTime()}.json`;
            } else if (type === 'csv') {
                let csvRows = ["Metric,Value,Threshold,Verdict"];
                if (root.evaluation) {
                    for (const [key, val] of Object.entries(root.evaluation)) {
                        if (typeof val === 'object' && val !== null) {
                            csvRows.push(`${key},${val.value},${val.threshold},${val.verdict}`);
                        }
                    }
                }
                blob = new Blob([csvRows.join("\n")], { type: 'text/csv' });
                fname = `perf_export_${new Date().getTime()}.csv`;
            }

            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = fname;
            a.click();
            window.URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
