name: Performance Testing Framework

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    # Run automatically every night at 2:00 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    # Allow manual triggering from GitHub UI

# Permissions required to deploy to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  run-perf-tests:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        
      - name: ⚙️ Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          
      - name: 📦 Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: 🌐 Install Playwright Browsers
        run: playwright install chromium --with-deps
        
      - name: 🚀 Run Performance Tests
        run: python run.py
        
      - name: ⚙️ Setup GitHub Pages
        if: always()
        uses: actions/configure-pages@v4
        
      - name: 💾 Upload Premium HTML Reports
        # ALWAYS run this step, even if the tests 'Fail' due to thresholds
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports/

      - name: 🌍 Deploy to GitHub Pages
        id: deployment
        if: always()
        uses: actions/deploy-pages@v4
