name: Endurance Soak Testing

on:
  workflow_dispatch:
    inputs:
      hours:
        description: 'Duration of the Soak test (in hours, max 6)'
        required: true
        default: '2'

permissions:
  contents: write

jobs:
  run-soak-metrics:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        
      - name: ⚙️ Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          
      - name: 📦 Install Architecture
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install aiohttp
          
      - name: 🌐 Install Playwright Engine
        run: playwright install chromium --with-deps
        
      - name: 🌊 Run Continuous Soak Loop
        run: python run.py --soak ${{ github.event.inputs.hours }} --spike 100
        
      - name: 💾 Upload Memory Leak Snapshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: soak-reports
          path: reports/
          retention-days: 14
